services:
  postgres:
    image: postgres:16-alpine
    container_name: megaparser_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: megaparser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: megaparser
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U megaparser -d megaparser"]
      interval: 5s
      timeout: 5s
      retries: 10
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=256MB
        -c work_mem=8MB
        -c effective_cache_size=1GB
        -c maintenance_work_mem=128MB
        -c wal_level=minimal
        -c max_wal_senders=0
        -c synchronous_commit=off

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: megaparser:latest
    container_name: megaparser_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://megaparser:${POSTGRES_PASSWORD}@postgres:5432/megaparser
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      ALLOWED_ADMIN_IDS: ${ALLOWED_ADMIN_IDS}
      FERNET_KEY: ${FERNET_KEY}
      LOG_LEVEL: INFO
      DRY_RUN: "false"
      DATA_DIR: /app/sessions
      CONFIG_PATH: /app/config.yaml
      LOG_DIR: /app/logs
    volumes:
      - ./sessions:/app/sessions
      - ./logs:/app/logs
      - ./dumps:/app/dumps
      - ./config.yaml:/app/config.yaml:ro

volumes:
  pg_data:
